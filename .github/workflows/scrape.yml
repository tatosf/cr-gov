name: Monthly Data Scrape

on:
  schedule:
    - cron: "0 8 1 * *" # 1st of each month, 8am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run scrapers
        run: npx tsx scripts/scrape.ts
        env:
          BCCR_EMAIL: ${{ secrets.BCCR_EMAIL }}
          BCCR_TOKEN: ${{ secrets.BCCR_TOKEN }}

      - name: Commit and push if changed
        run: |
          git diff --quiet src/data/seed/ && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/seed/
          git commit -m "chore: update seed data $(date +%Y-%m-%d)"
          git push
